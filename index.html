<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#C45D3E">
<title>家庭点餐</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 身份选择栏 -->
<div class="user-bar">
  <span class="user-bar-label">点餐人：</span>
  <div class="user-chips">
    <div class="user-chip active" data-user="嘟嘟" onclick="selectUser('嘟嘟')">🐽 嘟嘟</div>
    <div class="user-chip" data-user="薯薯" onclick="selectUser('薯薯')">🍠 薯薯</div>
  </div>
</div>

<header class="header"><h1 id="page-title">菜单</h1></header>

<!-- Menu -->
<div id="page-menu" class="page active">
  <div class="menu-layout">
    <div class="category-sidebar" id="category-list"></div>
    <div class="dish-list" id="dish-list">
      <div class="loading" id="menu-loading"><div class="spinner"></div><p>加载中...</p></div>
    </div>
  </div>
</div>

<!-- Orders / Cart -->
<div id="page-orders" class="page">
  <div id="cart-view">
    <div id="cart-items"></div>
    <div id="cart-empty" class="empty-state">
      <div class="empty-icon"><svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg></div>
      <p class="empty-title">还没有选菜</p>
      <p class="empty-sub">去菜单页添加菜品吧~</p>
    </div>
    <div id="cart-bottom" style="display:none;">
      <div class="card" style="margin:12px;border-radius:14px;padding:16px;">
        <label class="form-label">备注</label>
        <textarea id="order-note" class="form-textarea" placeholder="例如：少辣、不要香菜..." rows="2"></textarea>
      </div>
      <div class="cart-submit-bar">
        <div class="cart-total">共 <strong id="cart-total-num">0</strong> 道菜</div>
        <button class="btn-submit" onclick="submitOrder()">确认下单</button>
      </div>
    </div>
  </div>
  <div id="order-history" style="display:none;">
    <div id="order-list"></div>
  </div>
</div>

<!-- My -->
<div id="page-my" class="page">
  <div class="card">
    <div class="card-header"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><h3>已有菜品</h3></div>
    <div id="my-dish-list"><div class="loading"><div class="spinner"></div><p>加载中...</p></div></div>
  </div>
</div>

<nav class="bottom-nav">
  <div class="nav-item active" data-page="menu" onclick="switchPage('menu')">
    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
    <span class="nav-label">菜单</span>
  </div>
  <div class="nav-item" data-page="orders" onclick="switchPage('orders')">
    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    <span class="nav-label">订单</span>
  </div>
  <div class="nav-item" data-page="my" onclick="switchPage('my')">
    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span class="nav-label">我的</span>
  </div>
</nav>
<script src="js/app.js"></script>
</body></html>
